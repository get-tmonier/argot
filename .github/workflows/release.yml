name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-binaries:
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
          - target: darwin-arm64
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install JS dependencies
        run: bun install

      - name: Build binary
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          mkdir -p dist
          cd cli && bun build --compile \
            --target=bun-${{ matrix.target }} \
            --define "ARGOT_VERSION=\"$VERSION\"" \
            src/cli.ts \
            --outfile ../dist/argot-${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: argot-${{ matrix.target }}
          path: dist/argot-${{ matrix.target }}

  publish-engine:
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    name: Publish argot-engine to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true

      - name: Publish
        run: uv build --package argot-engine && uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

  publish-npm:
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    name: Publish @tmonier/argot to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Set version and publish
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          cd npm
          npm pkg set version="$VERSION"
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: [build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release and attach binaries
        run: |
          gh release create "${{ github.ref_name }}" dist/argot-* \
            --title "argot ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
