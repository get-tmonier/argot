name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "cli/package.json"
      - "engine/pyproject.toml"
      - "uv.lock"
  pull_request:
    branches: [main]

jobs:
  ts:
    if: "github.event_name == 'pull_request' || !startsWith(github.event.head_commit.message, 'chore: release v')"
    name: TypeScript (lint · typecheck · boundaries · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install JS dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Boundaries
        run: bun run boundaries

      - name: Test
        run: bun test

  py:
    if: "github.event_name == 'pull_request' || !startsWith(github.event.head_commit.message, 'chore: release v')"
    name: Python (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install Python dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check engine

      - name: Mypy
        run: uv run mypy engine

      - name: Pytest
        run: uv run pytest engine

  smoke:
    if: "github.event_name == 'pull_request' || !startsWith(github.event.head_commit.message, 'chore: release v')"
    name: Smoke test (argot extract)
    runs-on: ubuntu-latest
    needs: [ts, py]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install all dependencies
        run: bun install && uv sync

      - name: Run extract
        run: just extract .

      - name: Verify JSONL output
        run: test -s .argot/dataset.jsonl && echo "OK — dataset.jsonl is non-empty"
