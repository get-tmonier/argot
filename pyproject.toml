[tool.uv.workspace]
members = ["engine", "benchmarks"]

[tool.mypy]
strict = true
python_version = "3.13"
exclude = ["engine/argot/acceptance", "argot/acceptance", "benchmarks", "engine/argot/ml/train.py"]

[[tool.mypy.overrides]]
