[project]
name = "argot-engine"
version = "0.0.1"
requires-python = ">=3.11"
dependencies = [
    "pygit2==1.15.1",
    "tree-sitter==0.23.2",
    "tree-sitter-typescript==0.23.2",
    "tree-sitter-javascript==0.23.1",
    "tree-sitter-python==0.23.6",
    "msgspec==0.18.6",
]

[project.scripts]
argot-extract = "argot.extract:main"

[tool.uv]
dev-dependencies = [
    "ruff==0.7.0",
    "mypy==1.11.2",
    "pytest==8.3.3",
]

[tool.mypy]
strict = true
python_version = "3.11"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["argot/tests"]
